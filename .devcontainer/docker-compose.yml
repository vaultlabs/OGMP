# Used by VS Code / GitHub Codespaces — Postgres + Redis + Node dev container.
# Your project folder is mounted at /workspace (no Docker Desktop needed on your PC).

services:
  app:
    image: mcr.microsoft.com/devcontainers/javascript-node:1-22-bookworm
    init: true
    volumes:
      - ..:/workspace:cached
    working_dir: /workspace
    command: sleep infinity
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://ogmp:ogmp@postgres:5432/ogmp_mm?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ogmp
      POSTGRES_PASSWORD: ogmp
      POSTGRES_DB: ogmp_mm
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ogmp -d ogmp_mm"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
